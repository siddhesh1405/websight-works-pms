# Server
server.port=8080

# Profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/project_management_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin@123}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# JWT
app.jwt.secret=${APP_JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItcHJvamVjdC1tYW5hZ2VtZW50LXN5c3RlbQ==}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Logging (dev default)
logging.level.root=INFO
logging.level.com.pms.projectmanagement=DEBUG

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

